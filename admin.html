<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>11반 뉴스 - 스마트 에디터 ✍️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; letter-spacing: -0.01em; }
        
        /* 에디터 스타일링 */
        #editor {
            min-height: 400px;
            border: 2px solid #e2e8f0;
            border-radius: 1.5rem;
            padding: 1.5rem;
            background-color: white;
            outline: none;
            transition: all 0.2s;
        }
        #editor:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        #editor img { max-width: 100%; height: auto; border-radius: 1rem; margin: 1.5rem 0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        #editor p { margin-bottom: 1rem; leading: 1.8; color: #334155; }
    </style>
</head>
<body class="bg-[#f8fafc] p-10 pb-32">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-black text-slate-900tracking-tighter">11반 뉴스 발행기</h1>
            <button onclick="location.href='index.html'" class="text-sm text-slate-400 underline hover:text-indigo-600">메인으로</button>
        </header>

        <div class="space-y-6">
            <div class="grid grid-cols-2 gap-4 bg-white p-6 rounded-2xl border shadow-sm">
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-2 uppercase tracking-wider">대분류</label>
                    <select id="main-cat" onchange="updateSub()" class="w-full p-3.5 border rounded-xl bg-slate-50 outline-none focus:border-indigo-500 font-medium">
                        <option value="과학">과학</option><option value="인문">인문</option><option value="사회">사회</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-2 uppercase tracking-wider">소분류</label>
                    <select id="sub-cat" class="w-full p-3.5 border rounded-xl bg-slate-50 outline-none focus:border-indigo-500 font-medium"></select>
                </div>
                <div class="col-span-2 mt-2">
                    <label class="block text-xs font-bold text-slate-400 mb-2 uppercase tracking-wider">기사 제목</label>
                    <input id="title" type="text" placeholder="제목을 입력하세요" class="w-full p-4 border rounded-xl outline-none focus:border-indigo-500 font-bold text-lg">
                </div>
            </div>

            <div class="bg-white p-8 rounded-3xl border shadow-sm space-y-4">
                <div class="flex justify-between items-center px-1">
                    <label class="font-black text-lg text-slate-800">기사 본문 작성</label>
                    <label class="cursor-pointer flex items-center gap-2 bg-indigo-50 text-indigo-600 px-4 py-2.5 rounded-xl font-bold text-xs hover:bg-indigo-600 hover:text-white transition-all shadow-sm active:scale-95">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                        내 PC에서 사진 추가
                        <input type="file" accept="image/*" class="hidden" onchange="insertImage(this)">
                    </label>
                </div>
                
                <div id="editor" contenteditable="true" placeholder="여기에 글을 작성하고 사진을 추가하세요...">
                    <p>글을 작성하세요...</p>
                </div>
            </div>

            <button onclick="generateData()" class="w-full bg-slate-900 text-white py-5 rounded-3xl font-bold text-xl hover:bg-indigo-600 transition-all shadow-xl active:scale-95 flex items-center justify-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                JSON 데이터 발행 및 복사
            </button>
        </div>

        <div class="mt-12 p-8 bg-slate-100 rounded-3xl border-2 border-dashed border-slate-300 text-slate-600 space-y-2">
            <p class="text-sm font-bold">🚀 발행 방법:</p>
            <p class="text-xs leading-relaxed">1. 글과 사진 작성을 완료하고 버튼을 누르세요. 자동으로 전체 데이터가 복사됩니다.<br>2. 내 컴퓨터의 <code class="bg-white px-1">news_data.json</code> 파일을 열고 **전체 붙여넣기** 하세요.<br>3. 그 파일을 깃허브에 올리면 배포 끝!</p>
        </div>
    </div>

    <script>
        // 카테고리 설정 (기존과 동일)
        const subCats = { "과학": ["물리", "화학", "생명", "지구", "정보"], "인문": ["철학", "역사", "문학"], "사회": ["정치", "경제", "문화"] };
        function updateSub() {
            const main = document.getElementById('main-cat').value;
            document.getElementById('sub-cat').innerHTML = subCats[main].map(s => `<option value="${s}">${s}</option>`).join('');
        }
        updateSub(); // 초기화

        // [핵심 1] 에디터에 사진을 '진짜 사진'으로 삽입
        function insertImage(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                // 이미지를 Base64로 변환
                const base64Image = e.target.result;
                
                // 에디터 창 가져오기
                const editor = document.getElementById('editor');
                
                // 이미지 태그 생성
                const img = document.createElement('img');
                img.src = base64Image;
                img.className = "w-full my-6 rounded-2xl shadow-md"; // 예쁜 스타일
                
                // 현재 커서 위치에 삽입하는 게 좋지만, 
                // 서버 없는 간단 구현을 위해 맨 뒤에 추가함
                editor.appendChild(img);
                
                // 이미지 뒤에 글을 쓸 수 있게 문단 하나 추가
                const p = document.createElement('p');
                p.innerHTML = "<br>";
                editor.appendChild(p);

                // 파일 입력 초기화
                input.value = "";
            };
            reader.readAsDataURL(file);
        }

        // [핵심 2] 에디터의 HTML 전체를 가져와서 JSON 생성
        function generateData() {
            const title = document.getElementById('title').value.trim();
            // textarea.value 대신 editor.innerHTML을 사용!
            const content = document.getElementById('editor').innerHTML;

            if(!title || !content || content === '<p>글을 작성하세요...</p>') {
                return alert("제목과 내용을 모두 입력해주세요!");
            }

            const news = {
                id: Date.now(),
                main: document.getElementById('main-cat').value,
                sub: document.getElementById('sub-cat').value,
                title,
                content, // 이제 여기에 <p>나 <img> 태그가 섞여서 들어감
                date: new Date().toLocaleDateString('ko-KR')
            };

            // 기존 데이터와 합침 (로컬스토리지 활용)
            let list = JSON.parse(localStorage.getItem('my_news_list')) || [];
            list.unshift(news);
            localStorage.setItem('my_news_list', JSON.stringify(list));

            // JSON 코드로 복사
            const jsonOutput = JSON.stringify(list, null, 2);
            navigator.clipboard.writeText(jsonOutput).then(() => {
                alert("🚀 성공적으로 실행되었습니다.");
            });
        }
    </script>
</body>
</html>
