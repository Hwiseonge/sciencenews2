<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>11.NEWS - 상세보기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
    </style>
</head>
<body class="bg-white">
    <main class="max-w-3xl mx-auto px-6 py-20">
        <button onclick="history.back()" class="text-slate-400 font-bold mb-10 hover:text-indigo-600">← 뒤로가기</button>
        
        <div id="loading-spinner" class="text-center py-20">
            <p class="text-slate-400 animate-pulse">기사를 불러오는 중입니다...</p>
        </div>

        <article id="news-article" class="hidden">
            <span id="news-info" class="text-indigo-600 font-bold text-sm uppercase tracking-widest"></span>
            <h1 id="news-title" class="text-4xl font-black text-slate-900 mt-4 mb-8 leading-tight"></h1>
            <div id="news-content" class="prose max-w-none text-slate-700 leading-relaxed text-lg">
                </div>
        </article>
    </main>

    <script type="module">
        import { db, ref, get } from './firebase-config.js';

        // 1. URL에서 id 파라미터 가져오기
        const urlParams = new URLSearchParams(window.location.search);
        const newsId = urlParams.get('id');

        async function fetchNewsDetail() {
            if (!newsId) {
                alert("기사 ID가 없습니다.");
                location.href = 'index.html';
                return;
            }

            try {
                // 2. Firebase 경로 설정 (news 폴더 안의 해당 ID)
                const newsRef = ref(db, `news/${newsId}`);
                const snapshot = await get(newsRef);

                if (snapshot.exists()) {
                    const data = snapshot.val();

                    // 3. HTML에 데이터 채우기
                    document.getElementById('news-title').innerText = data.title;
                    document.getElementById('news-info').innerText = `${data.main} > ${data.sub} | ${data.date}`;
                    document.getElementById('news-content').innerHTML = data.content;

                    // 4. 로딩 숨기고 본문 보여주기
                    document.getElementById('loading-spinner').classList.add('hidden');
                    document.getElementById('news-article').classList.remove('hidden');
                    document.title = data.title;
                } else {
                    alert("해당 기사를 찾을 수 없습니다.");
                    location.href = 'index.html';
                }
            } catch (error) {
                console.error("Firebase 에러 상세:", error);
                alert("데이터 로딩 실패: " + error.message);
            }
        }

        window.onload = fetchNewsDetail;
    </script>
</body>
</html>
