<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>11반 뉴스 - 관리자 로그인</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-5">
    
    <div id="login-section" class="relative max-w-md mx-auto mt-20 bg-white p-8 rounded-2xl shadow-lg">
        <button onclick="location.href='index.html'" class="absolute top-4 right-4 text-sm text-slate-400 hover:text-indigo-600">main ↗</button>
        
        <h2 class="text-2xl font-bold mb-4">관리자 로그인</h2>
        <input id="pw" type="password" placeholder="비밀번호 입력" class="w-full p-3 border rounded-xl mb-4 focus:ring-2 focus:ring-indigo-500 outline-none">
        <button onclick="login()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 transition-colors">접속하기</button>
    </div>

    <script>
        function login() {
            const pw = document.getElementById('pw').value;
            if(pw === "123") {
                // 세션 스토리지에 로그인 정보 저장 (브라우저 끄면 사라짐)
                sessionStorage.setItem('isAdmin', 'true');
                alert("반갑습니다, 관리자님!");
                location.href = 'admin.html'; // 에디터 페이지로 이동
            } else {
                alert("비밀번호가 틀렸습니다.");
            }
        }

        // 엔터키 지원
        document.getElementById('pw').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') login();
        });
    </script>
</body>
</html>
