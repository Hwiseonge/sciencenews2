<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>11.NEWS - 메인 뉴스룸</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #fcfcfd; }
        .nav-btn { transition: all 0.3s; color: #64748b; }
        .nav-btn.active-btn { color: #4f46e5; font-weight: 800; position: relative; }
        .nav-btn.active-btn::after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background: #4f46e5; border-radius: 50%; }
        .news-card { height: 380px; display: flex; flex-direction: column; background: white; border-radius: 24px; border: 1px solid #f1f5f9; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); overflow: hidden; }
        .news-card:hover { transform: translateY(-10px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100">
        <div class="container mx-auto px-6 h-20 flex items-center justify-between">
            <h1 class="text-2xl font-extrabold tracking-tighter text-slate-900 cursor-pointer" onclick="location.reload()">11<span class="text-indigo-600">.</span>NEWS</h1>
            <div class="flex items-center gap-4">
                <button id="admin-indicator" class="hidden bg-indigo-600 text-white px-3 py-1.5 rounded-full text-[10px] font-black shadow-lg hover:bg-red-500 transition-all">ADMIN MODE</button>
                <button onclick="goLogin()" class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-50 hover:bg-slate-100">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" /></svg>
                </button>
            </div>
        </div>
        <nav class="container mx-auto px-6 pb-4 flex gap-8 overflow-x-auto no-scrollbar justify-center items-center">
            <button onclick="filterNews('전체', this)" class="nav-btn active-btn text-sm font-semibold whitespace-nowrap">전체보기</button>
            <button onclick="filterNews('과학', this)" class="nav-btn text-sm font-semibold whitespace-nowrap">과학공학</button>
            <button onclick="filterNews('인문', this)" class="nav-btn text-sm font-semibold whitespace-nowrap">인문예술</button>
            <button onclick="filterNews('사회', this)" class="nav-btn text-sm font-semibold whitespace-nowrap">사회경제</button>
            <div class="w-px h-3 bg-slate-200 mx-2"></div>
            <button onclick="location.href='request.html'" class="text-sm font-bold text-indigo-600 whitespace-nowrap hover:bg-indigo-50 px-3 py-1 rounded-full transition-all">질문하기 💬</button>
        </nav>
    </header>

    <main class="container mx-auto px-6 py-12">
        <div id="news-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-10"></div>
    </main>

    <script>
        const isAdmin = sessionStorage.getItem('isAdmin') === 'true';

        // 관리자 UI 업데이트 및 로그아웃
        if(isAdmin) {
            const badge = document.getElementById('admin-indicator');
            badge.classList.remove('hidden');
            badge.onclick = () => { if(confirm("로그아웃하시겠습니까?")) { sessionStorage.removeItem('isAdmin'); location.reload(); }};
        }

        function goLogin() {
            isAdmin ? location.href='admin.html' : location.href='login.html';
        }

        function loadNews(filter = '전체') {
            const list = JSON.parse(localStorage.getItem('my_news_list')) || [];
            const grid = document.getElementById('news-grid');
            const filtered = filter === '전체' ? list : list.filter(n => n.main === filter);
            grid.innerHTML = filtered.map(n => {
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = n.content;
                const imgSrc = tempDiv.querySelector('img')?.src || 'https://images.unsplash.com/photo-1504711434969-e33886168f5c';
                return `
                <div onclick="location.href='index2.html?id=${n.id}'" class="news-card cursor-pointer">
                    <div class="h-[220px] overflow-hidden"><img src="${imgSrc}" class="w-full h-full object-cover"></div>
                    <div class="p-6 flex flex-col justify-between flex-grow">
                        <div><span class="text-[10px] font-bold text-indigo-500 uppercase mb-2 block">${n.sub}</span>
                        <h2 class="text-xl font-bold text-slate-900 line-clamp-2 leading-tight">${n.title}</h2></div>
                        <div class="flex justify-between items-center mt-4"><span class="text-[11px] text-slate-400">${n.date}</span><span class="text-indigo-600 text-xs font-bold">READ →</span></div>
                    </div>
                </div>`;
            }).join('');
        }

        function filterNews(cat, btn) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-btn'));
            btn.classList.add('active-btn');
            loadNews(cat);
        }
        window.onload = () => loadNews();
    </script>
</body>
</html>
