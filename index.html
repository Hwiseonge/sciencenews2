<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11반 뉴스 스테이션</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; letter-spacing: -0.01em; }
        .active-btn { background-color: #4f46e5 !important; color: white !important; shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900">

    <header class="bg-white/80 backdrop-blur-md border-b sticky top-0 z-50">
        <div class="container mx-auto px-6 h-16 flex items-center justify-between">
            <h1 class="text-2xl font-black italic tracking-tighter text-indigo-600 cursor-pointer" onclick="location.reload()">11 CLASS NEWS</h1>
            <div class="flex items-center gap-4">
                <span class="text-[10px] font-bold text-slate-400 bg-slate-100 px-2 py-1 rounded">READER MODE</span>
                <button onclick="location.href='admin.html'" class="text-slate-300 hover:text-indigo-600 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37a1.724 1.724 0 002.572-1.065z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <nav class="bg-white border-b sticky top-16 z-40 overflow-x-auto hide-scrollbar">
        <div class="container mx-auto px-6 py-3 flex gap-3 text-sm font-bold text-slate-500 whitespace-nowrap">
            <button onclick="filterNews('전체', this)" class="nav-btn active-btn px-5 py-2 rounded-xl transition-all">전체</button>
            <button onclick="filterNews('물리', this)" class="nav-btn px-5 py-2 rounded-xl bg-slate-50 hover:bg-slate-100 transition-all">물리</button>
            <button onclick="filterNews('화학', this)" class="nav-btn px-5 py-2 rounded-xl bg-slate-50 hover:bg-slate-100 transition-all">화학</button>
            <button onclick="filterNews('생명', this)" class="nav-btn px-5 py-2 rounded-xl bg-slate-50 hover:bg-slate-100 transition-all">생명</button>
            <button onclick="filterNews('지구', this)" class="nav-btn px-5 py-2 rounded-xl bg-slate-50 hover:bg-slate-100 transition-all">지구</button>
            <button onclick="filterNews('정보', this)" class="nav-btn px-5 py-2 rounded-xl bg-slate-50 hover:bg-slate-100 transition-all">정보</button>
            <button onclick="filterNews('인문', this)" class="nav-btn px-5 py-2 rounded-xl bg-slate-50 hover:bg-slate-100 transition-all">인문</button>
            <button onclick="filterNews('사회', this)" class="nav-btn px-5 py-2 rounded-xl bg-slate-50 hover:bg-slate-100 transition-all">사회</button>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-10">
        <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <div id="news-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="bg-white w-full max-w-2xl max-h-[85vh] rounded-3xl shadow-2xl z-10 overflow-hidden flex flex-col relative">
            <button onclick="closeModal()" class="absolute top-5 right-5 p-2 bg-slate-100 rounded-full hover:bg-slate-200 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l18 18" /></svg>
            </button>
            <div class="p-8 overflow-y-auto custom-scrollbar">
                <div id="modal-tag" class="text-xs font-black text-indigo-600 mb-2 uppercase tracking-widest">CATEGORY</div>
                <h2 id="modal-title" class="text-3xl font-black text-slate-900 mb-4 leading-tight">기사 제목입니다.</h2>
                <div id="modal-date" class="text-sm text-slate-400 mb-8 pb-4 border-b border-slate-100">2024. 01. 01</div>
                <div id="modal-content" class="text-slate-700 leading-relaxed text-lg whitespace-pre-wrap">기사 내용이 여기에 들어갑니다.</div>
            </div>
            <div class="p-6 bg-slate-50 border-t flex justify-center">
                <button onclick="closeModal()" class="px-8 py-3 bg-slate-900 text-white font-bold rounded-2xl hover:bg-indigo-600 transition-all shadow-lg">닫기</button>
            </div>
        </div>
    </div>

    <script>
        // 뉴스 데이터 불러오기 및 필터링
        function loadNews(filter = '전체') {
            const list = JSON.parse(localStorage.getItem('my_news_list')) || [];
            const grid = document.getElementById('news-grid');
            
            const filtered = filter === '전체' ? list : list.filter(n => n.sub === filter || n.main === filter);

            if(filtered.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-32">
                        <div class="text-5xl mb-4">📢</div>
                        <p class="text-slate-400 font-bold">'${filter}' 카테고리에 등록된 기사가 없습니다.</p>
                    </div>`;
                return;
            }

            grid.innerHTML = filtered.map((n, index) => `
                <div class="group bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 flex flex-col hover:shadow-xl hover:-translate-y-2 transition-all duration-300">
                    <div class="flex items-center gap-3 mb-4">
                        <span class="text-[10px] font-black bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full uppercase tracking-tighter">${n.main} · ${n.sub}</span>
                        <span class="text-[10px] font-medium text-slate-300">${n.date}</span>
                    </div>
                    <h2 class="text-xl font-bold mb-4 text-slate-900 group-hover:text-indigo-600 transition-colors line-clamp-2 leading-snug">${n.title}</h2>
                    <p class="text-slate-500 text-sm leading-relaxed mb-8 line-clamp-3">${n.content}</p>
                    <button onclick='openModal(${JSON.stringify(n).replace(/'/g, "&apos;")})' 
                            class="mt-auto w-full py-4 bg-slate-900 text-white font-bold rounded-2xl text-xs hover:bg-indigo-600 transition-all shadow-md active:scale-95">
                        기사 전체 읽기
                    </button>
                </div>
            `).join('');
        }

        // 모달 열기
        function openModal(news) {
            document.getElementById('modal-tag').innerText = `${news.main} | ${news.sub}`;
            document.getElementById('modal-title').innerText = news.title;
            document.getElementById('modal-date').innerText = news.date;
            document.getElementById('modal-content').innerText = news.content;
            
            const modal = document.getElementById('news-modal');
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden'; // 스크롤 방지
        }

        // 모달 닫기
        function closeModal() {
            const modal = document.getElementById('news-modal');
            modal.classList.add('hidden');
            document.body.style.overflow = 'auto'; // 스크롤 복구
        }

        // 필터링 버튼 클릭
        function filterNews(cat, btn) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-btn'));
            btn.classList.add('active-btn');
            loadNews(cat);
        }

        window.onload = () => loadNews();
    </script>
</body>
</html>
