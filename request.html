<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11.NEWS - 질문 및 요구사항</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #fcfcfd; color: #1a1a1a; }
        
        /* 커스텀 스크롤바 스타일 */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* 질문 카드 애니메이션 */
        .request-card { transition: all 0.3s ease; border-radius: 2rem; }
    </style>
</head>
<body>

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100">
        <div class="container mx-auto px-6 h-20 flex items-center justify-between">
            <h1 class="text-2xl font-extrabold tracking-tighter text-slate-900 cursor-pointer" onclick="location.href='index.html'">
                11<span class="text-indigo-600">.</span>NEWS
            </h1>
            <div class="flex items-center gap-4">
                <button id="admin-indicator" class="hidden flex items-center gap-2 bg-indigo-600 text-white px-4 py-2 rounded-full shadow-lg shadow-indigo-100 hover:bg-red-500 transition-all group">
                    <span class="text-[10px] font-black uppercase tracking-widest">Admin Mode</span>
                    <span class="text-[10px] hidden group-hover:inline ml-1 font-bold"> (Logout)</span>
                </button>
                <button onclick="location.href='index.html'" class="text-sm font-bold text-slate-400 hover:text-indigo-600 transition-colors">뉴스룸으로</button>
            </div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-6 py-12">
        <section class="mb-16">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-black mb-3 tracking-tight">무엇이든 물어보세요 💬</h2>
                <p class="text-slate-500 font-medium text-sm">익명으로 소중한 의견을 전달해 주세요.</p>
            </div>
            
            <div class="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm space-y-3">
                <input id="nickname-input" type="text" maxlength="10" placeholder="별명 (예: 대학보내줘 , 나랑영독작할사람)" 
                    class="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold outline-none focus:ring-2 focus:ring-indigo-100 text-sm">
                
                <textarea id="request-input" rows="3" placeholder="내용을 입력하세요..." 
                    class="w-full p-4 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-indigo-100 font-medium text-lg resize-none"></textarea>
                
                <button onclick="submitRequest()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-indigo-600 transition-all active:scale-[0.98] shadow-xl shadow-slate-200">
                    의견 전달하기
                </button>
            </div>
        </section>

        <section>
            <div class="flex items-center justify-between mb-8 px-2">
                <h3 class="text-xl font-bold text-slate-800">답변 완료된 질문</h3>
                <span id="req-count" class="text-xs font-bold text-slate-400 uppercase tracking-widest">0 MESSAGES</span>
            </div>
            
            <div id="request-list" class="grid gap-6 max-h-[620px] overflow-y-auto pr-3 custom-scrollbar">
                </div>
        </section>
    </main>

    <script type="module">
    import { db, ref, push, onValue, isAdmin } from './firebase-config.js';

    // 질문 제출
    window.submitRequest = () => {
        const nickname = document.getElementById('nickname-input').value.trim() || "익명";
        const content = document.getElementById('request-input').value.trim();
        if(!content) return alert("내용을 입력해주세요!");

        push(ref(db, 'requests'), {
            nickname, content, answer: "", date: new Date().toLocaleDateString('ko-KR')
        }).then(() => {
            alert("전달되었습니다!");
            document.getElementById('request-input').value = "";
        });
    };

    // 실시간 목록 로드 (스크롤 영역)
    onValue(ref(db, 'requests'), (snapshot) => {
        const data = snapshot.val();
        const box = document.getElementById('request-list');
        if(!data) { box.innerHTML = "질문이 없습니다."; return; }

        const list = Object.keys(data).map(k => ({id:k, ...data[k]})).reverse();
        // 답변 완료된 것만 보여주기 (관리자는 모두 보기)
        const displayList = isAdmin ? list : list.filter(r => r.answer !== "");

        box.innerHTML = displayList.map(r => `
            <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm mb-4">
                <div class="flex justify-between mb-2">
                    <span class="text-xs font-black text-indigo-500">@${r.nickname}</span>
                    <span class="text-[10px] text-slate-300">${r.date}</span>
                </div>
                <p class="font-bold mb-4 italic">"${r.content}"</p>
                <div class="bg-indigo-50 p-4 rounded-2xl">
                    <p class="text-sm text-indigo-900">${r.answer || "관리자 답변 대기 중..."}</p>
                </div>
            </div>`).join('');
    });
</script>
</body>
</html>
